<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Research Journey of Happy</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 900px; margin: 40px auto; padding: 20px; color: #333; }
        nav { display: flex; gap: 20px; border-bottom: 2px solid #ddd; padding-bottom: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        nav a { cursor: pointer; text-decoration: none; color: #666; font-weight: bold; padding: 5px 10px; }
        nav a:hover, nav a.active { color: #000; border-bottom: 2px solid #000; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        img { max-width: 100%; height: auto; }
        pre { background: #f4f4f4; padding: 15px; overflow-x: auto; }
    </style>
</head>
<body>
    <nav>
        <a onclick="openTab(event, 'tab1')" class="active">🌟 MEMORY</a>
        <a onclick="openTab(event, 'tab2')">🙇‍♀️ Gratitude</a>
        <a onclick="openTab(event, 'tab3')">🌈 Additional Introduction</a>
        <a onclick="openTab(event, 'tab4')">🌈 Figures</a>
        <a onclick="openTab(event, 'tab5')">🌈 Course Project</a>
        <a onclick="openTab(event, 'tab6')">🌈 Open Research</a>
        <a onclick="openTab(event, 'tab7')">🌈 Trainee Diary</a>
    </nav>

    <div id="tab1" class="tab-content active" data-md="2026-05-24/mds/memory.md"></div>
    <div id="tab2" class="tab-content" data-md="2026-05-24/mds/gratitude.md"></div>
    <div id="tab3" class="tab-content" data-md="2026-05-24/mds/additional_info.md"></div>
    <div id="tab4" class="tab-content" data-md="2026-05-24/mds/figures.md"></div>
    <div id="tab5" class="tab-content" data-md="2026-05-24/mds/course_project.md"></div>
    <div id="tab6" class="tab-content" data-md="2026-05-24/mds/open_research.md"></div>
    <div id="tab7" class="tab-content" data-md="2026-05-24/mds/diary.md"></div>

    <script>
        async function loadMarkdown(tabElement) {
            const mdPath = tabElement.getAttribute('data-md');
            if (tabElement.innerHTML.trim() === "") {
                try {
                    const response = await fetch(mdPath);
                    let fullText = await response.text();
                    
                    const includeRegex = /\[include:(.*?)\]/g;
                    let match;
                    while ((match = includeRegex.exec(fullText)) !== null) {
                        try {
                            const subResponse = await fetch(match[1]);
                            const subContent = await subResponse.text();
                            fullText = fullText.replace(match[0], subContent);
                        } catch (e) {
                            console.error("파일 로드 실패:", match[1]);
                            fullText = fullText.replace(match[0], `(파일을 불러올 수 없음)`);
                        }
                    }
                    tabElement.innerHTML = marked.parse(fullText);
                } catch (error) {
                    tabElement.innerHTML = "<p>파일을 불러오지 못했습니다. 경로를 확인해주세요.</p>";
                }
            }
        }

        function openTab(evt, tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('nav a').forEach(link => link.classList.remove('active'));
            const selectedTab = document.getElementById(tabId);
            selectedTab.classList.add('active');
            evt.currentTarget.classList.add('active');
            loadMarkdown(selectedTab);
        }

        loadMarkdown(document.getElementById('tab1'));
    </script>
</body>
</html>
