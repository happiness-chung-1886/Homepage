<!DOCTYPE html>
<html lang="ko">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-H74Y57LT1M"></script>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Antiweapon</title>
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <style>
        body { font-family: 'Calibri', 'Segoe UI', Arial, sans-serif; line-height: 1.7; max-width: 900px; margin: 40px auto; padding: 20px; color: #333; background: #ffffff; }
        nav { display: flex; gap: 14px; border-bottom: 2px solid #ddd; padding-bottom: 10px; margin-bottom: 30px; flex-wrap: nowrap; overflow-x: auto; }
        nav button { cursor: pointer; border: none; background: transparent; color: #666; font-weight: bold; padding: 8px 10px; font-size: 15px; transition: 0.2s; }
        nav button:hover, nav button.active { color: #000; border-bottom: 2px solid #000; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        img { border-radius: 10px; }
        .error { color: #b00020; background: #fff3f3; padding: 12px; border-radius: 8px; }
        .banner { width: 100%; margin-bottom: 30px; overflow: hidden; border-radius: 20px; }
        .banner video { width: 100%; max-height: 600px; object-fit: contain; display: block; }
        
        /* 카드 UI 스타일 */
        .diary-card { border: 1px solid #eee; padding: 20px; margin-bottom: 20px; border-radius: 16px; background: #fafafa; }
        .diary-meta { font-size: 0.85em; color: #888; margin-bottom: 10px; }
        .diary-actions { margin-top: 15px; display: flex; gap: 15px; border-top: 1px solid #eee; padding-top: 10px; }
        .action-btn { cursor: pointer; background: none; border: none; color: #555; font-size: 0.9em; display: flex; align-items: center; gap: 5px; }
        .action-btn:hover { color: #000; }
        a { color: #969696; }
        .perspective-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px;}
        .perspective-card { border: 1px solid #eee; border-radius: 18px; padding: 22px; background: linear-gradient(135deg, #fafafa, #ffffff); box-shadow: 0 6px 18px rgba(0,0,0,0.04); cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;}
        .perspective-card:hover {transform: translateY(-4px); box-shadow: 0 10px 24px rgba(0,0,0,0.08);}
        .perspective-date { font-size: 0.85em; color: #888; margin-bottom: 10px;}
        .perspective-title { font-size: 1.25em; font-weight: bold; color: #222; margin-bottom: 10px;}
        .perspective-desc { color: #666; font-size: 0.95em;}
        .back-btn { margin-bottom: 20px; cursor: pointer; border: none; background: #f1f1f1; padding: 8px 14px; border-radius: 10px; color: #444;}
        .back-btn:hover {background: #e6e6e6;}
    </style>
</head>
<body>
    <div class="banner">
        <video autoplay muted loop playsinline><source src="images/banner.mp4" type="video/mp4"></video>
    </div>
    <nav>
        <button onclick="openTab(event, 'tab0')" class="active">Intro</button>
        <button onclick="openTab(event, 'tab1')">MEMORY</button>
        <button onclick="openTab(event, 'tab2')">Gratitude</button>
        <button onclick="openTab(event, 'tab4')">Figures</button>
        <button onclick="openTab(event, 'tab5')">Course Project</button>
        <button onclick="openTab(event, 'tab6')">Ideas</button>
        <button onclick="openTab(event, 'tab7')">Diary</button>
        <button onclick="openTab(event, 'tab8')">Preprint</button>
        <button onclick="openTab(event, 'tab9')">Perspectives</button>
    </nav>

    <div id="tab0" class="tab-content active" data-md="markdown_files/intro.md"></div>
    <div id="tab1" class="tab-content" data-md="markdown_files/memory.md"></div>
    <div id="tab2" class="tab-content" data-md="markdown_files/gratitude.md"></div>
    <div id="tab4" class="tab-content" data-md="markdown_files/figures.md"></div>
    <div id="tab5" class="tab-content" data-md="markdown_files/course_project.md"></div>
    <div id="tab6" class="tab-content"></div>
    <div id="tab7" class="tab-content" data-md="markdown_files/diary.md"></div>
    <div id="tab8" class="tab-content" data-md="markdown_files/temporal_preprint.md"></div>
    <div id="tab9" class="tab-content"></div>

    <script>
        async function fetchText(path) {
            console.log("fetch path:", path);
            const response = await fetch(path);
            console.log("status:", response.status, response.url);

            if (!response.ok) throw new Error(`${response.status} ${response.url}`);
            return await response.text();
        }

        async function resolveIncludes(markdown) {
            const includeRegex = /\[include:(.*?)\]/g;
            const matches = [...markdown.matchAll(includeRegex)];
            for (const match of matches) {
                const includePath = match[1].trim();
                try {
                    const includedText = await fetchText(includePath);
                    markdown = markdown.replace(match[0], includedText);
                } catch {
                    markdown = markdown.replace(match[0], `\n\n> include 파일을 불러오지 못했습니다: ${includePath}\n\n`);
                }
            }
            return markdown;
        }

        async function loadMarkdown(tabElement) {
            // 1. 이미 로드된 상태이고, 강제 초기화(data-loaded="false")가 안 되어 있다면 종료
            if (tabElement.dataset.loaded === "true") return;
            
            tabElement.innerHTML = "<p>Loading...</p>";
            try {
                const file = tabElement.getAttribute("data-md");
                if (!file) return; // 파일 경로가 없으면 종료

                let text = await fetchText(file);
                text = await resolveIncludes(text);
                
                // 마크다운 파싱
                let html = marked.parse(text);
                
                // Diary 탭일 경우 수정된 로직
                if (tabElement.id === 'tab7') {
                    let newHtml = ''; // 모든 걸 담을 변수웅

                    // 1. 운영 원칙(diary_info.md) 먼저 추가
                    try {
                        let introText = await fetchText('markdown_files/diary_info.md');
                        newHtml += `<div class="diary-intro">${marked.parse(introText)}</div>`;
                    } catch (e) {
                        console.log("운영 원칙 파일을 불러오지 못했웅, 계속 진행웅!");
                    }

                    // 2. 기록 블록들 추가
                    const blocks = text.split(/\n\s*\n/);
                    blocks.forEach(block => {
                        if (block.trim() === '') return;

                        const lines = block.trim().split('\n');
                        const header = lines[0];
                        const body = lines.slice(1).join('\n');
                        
                        newHtml += `
                            <div class="diary-card">
                                <div class="diary-meta" style="font-weight: bold; color: #333; margin-bottom:10px;">${header}</div>
                                <div class="diary-body">${marked.parse(body)}</div>
                                <div class="diary-actions" style="margin-top:15px; border-top:1px solid #eee; padding-top:10px;">
                                    <button class="action-btn" onclick="toggleLike(this)">💡 inspiring</button>
                                    <button class="action-btn" onclick="openComments()">💬 comments</button>
                                </div>
                            </div>`;
                    });
                    
                    // 3. 완성된 전체 HTML을 덮어씌움웅
                    html = newHtml;
                }
                
                tabElement.innerHTML = html;
                tabElement.dataset.loaded = "true"; // 로드 완료 표시
            } catch (error) {
                tabElement.innerHTML = `<p class="error">파일을 불러오지 못했습니다.</p>`;
                console.error("로드 에러:", error);
            }
        }

        function openTab(evt, tabId) {
            document.querySelectorAll(".tab-content").forEach(tab => tab.classList.remove("active"));
            document.querySelectorAll("nav button").forEach(button => button.classList.remove("active"));
            const selectedTab = document.getElementById(tabId);
            selectedTab.classList.add("active");
            evt.currentTarget.classList.add("active");
            if (tabId === "tab9") {
                renderPerspectivesList();
            } 
            else if (tabId === "tab6") {
                renderIdeaList();
            }
            else { 
                loadMarkdown(selectedTab);
            }
        }

        function toggleLike(btn) {
            btn.style.color = btn.style.color === 'red' ? '#555' : 'red';
            btn.textContent = btn.textContent.includes('like') ? '💡 inspiring ' : '💡 inspiring ';
        }

        function openComments() {
            alert('connecting comments 🐰');
        }
      
        const perspectives = [
            {
                title: "Remembering Marie Curie: Her Legacy and the Ongoing Pursuit of Equity for Everyone",
                date: "July 2026",
                file: "markdown_files/Perspectives/07042026.md"
            },
            {
                title: "Why True Negatives Matter as Much as True Positives Especially in the Mental Health Diagnosis",
                date: "May 2026",
                file: "markdown_files/Perspectives/05192026.md"
            }
        ];

        const ideas = [
            {
                title: "AI for Comupter Vision",
                file: "markdown_files/Research Ideas/CV.md"
            },
            {
                title: "AI for Ethics",
                file: "markdown_files/Research Ideas/Ethics.md"
            },
            {
                title: "AI for Extended Reality",
                file: "markdown_files/Research Ideas/XR.md"
            },
            {
                title: "AI for Nuclear Medicine",
                file: "markdown_files/Research Ideas/NM.md"
            },
            {
                title: "AI for Robotics",
                file: "markdown_files/Research Ideas/Robots.md"
            },
            {
                title: "AI with Neural Networks",
                file: "markdown_files/Research Ideas/NN.md"
            },
        ];

        function renderPerspectivesList() {
            const tab = document.getElementById("tab9");

            let html = `
                <div class="perspective-grid">
            `;

            perspectives.forEach((item, index) => {
                html += `
                    <div class="perspective-card" onclick="openPerspective(${index})">
                        <div class="perspective-date">${item.date}</div>
                        <div class="perspective-title">${item.title}</div>
                    </div>
                `;
            });

            html += `</div>`;
            tab.innerHTML = html;
        }

        async function openPerspective(index) {
            const tab = document.getElementById("tab9");
            const item = perspectives[index];

            // 상태 초기화
            tab.dataset.loaded = "false"; 
            tab.setAttribute("data-md", item.file);
            
            // 로드 시작
            await loadMarkdown(tab);

            // Back 버튼을 상단에 추가
            const backBtn = document.createElement("button");
            backBtn.className = "back-btn";
            backBtn.innerText = "← Back to Perspectives";
            backBtn.onclick = renderPerspectivesList;
            
            // 기존에 있던 로딩 텍스트나 내용을 고려해 가장 앞에 삽입
            tab.prepend(backBtn);
        }

        function renderIdeaList() {
            const tab = document.getElementById("tab10");

            let html = `<div class="perspective-grid">`;

            ideas.forEach((item, index) => {
                html += `
                    <div class="perspective-card"
                        onclick="openIdea(${index})">
                        <div class="perspective-title">${item.title}</div>
                    </div>
                `;
            });

            html += "</div>";

            tab.innerHTML = html;
        }

        async function openIdea(index) {

            const tab = document.getElementById("tab6");
            const item = ideas[index];

            tab.dataset.loaded = "false";
            tab.setAttribute("data-md", item.file);

            await loadMarkdown(tab);

            const backBtn = document.createElement("button");
            backBtn.className = "back-btn";
            backBtn.innerText = "← Back to Ideas";
            backBtn.onclick = renderIdeaList;

            tab.prepend(backBtn);
        }

        document.addEventListener("DOMContentLoaded", () => loadMarkdown(document.getElementById("tab0")));
    </script>
</body>
</html>
