<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Research Journey of Happy</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 900px; margin: 40px auto; padding: 20px; color: #333; }
        nav { display: flex; gap: 20px; border-bottom: 2px solid #ddd; padding-bottom: 10px; margin-bottom: 30px; }
        nav a { cursor: pointer; text-decoration: none; color: #666; font-weight: bold; padding: 5px 10px; }
        nav a:hover, nav a.active { color: #000; border-bottom: 2px solid #000; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        pre { background: #f4f4f4; padding: 15px; overflow-x: auto; }
    </style>
</head>
<body>
    <nav>
        <a onclick="openTab(event, 'tab1')" class="active">🌟 MEMORY</a>
        <a onclick="openTab(event, 'tab2')">🙇‍♀️ Gratitude</a>
        <a onclick="openTab(event, 'tab3')">🌈 Additional Introduction</a>
        <a onclick="openTab(event, 'tab4')">🌈 Figures</a>
        <a onclick="openTab(event, 'tab5')">🌈 Course Project</a>
        <a onclick="openTab(event, 'tab6')">🌈 Open Research</a>
        <a onclick="openTab(event, 'tab7')">🌈 Trainee Diary</a>
    </nav>

    <div id="tab1" class="tab-content active" data-md="2026-05-24/memory.md"></div>
    <div id="tab2" class="tab-content" data-md="2026-05-24/gratitude.md"></div>
    <div id="tab3" class="tab-content" data-md="2026-05-24/additional_info.md"></div>
    <div id="tab4" class="tab-content" data-md="2026-05-24/figures.md"></div>
    <div id="tab5" class="tab-content" data-md="2026-05-24/course_project.md"></div>
    <div id="tab6" class="tab-content" data-md="2026-05-24/open_research.md"></div>
    <div id="tab7" class="tab-content" data-md="2026-05-24/diary.md"></div>

    <script>
        // 마크다운 파일을 가져와서 변환하는 함수
        async function loadMarkdown(tabElement) {
            const mdPath = tabElement.getAttribute('data-md');
            if (tabElement.innerHTML.trim() === "") { // 내용이 없을 때만 불러오기
                try {
                    const response = await fetch(mdPath);
                    const text = await response.text();
                    tabElement.innerHTML = marked.parse(text);
                } catch (error) {
                    tabElement.innerHTML = "<p>파일을 불러오지 못했습니다.</p>";
                }
            }
        }

        function openTab(evt, tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('nav a').forEach(link => link.classList.remove('active'));
            
            const selectedTab = document.getElementById(tabId);
            selectedTab.classList.add('active');
            evt.currentTarget.classList.add('active');
            
            loadMarkdown(selectedTab); // 탭을 클릭할 때 마크다운 로드
        }

        // 첫 페이지 로드 시 첫 번째 탭 데이터 불러오기
        loadMarkdown(document.getElementById('tab1'));
    </script>
</body>
</html>
